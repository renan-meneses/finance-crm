version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: finance-crm-app
    container_name: finance-crm-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - finance-network

  nginx:
    image: nginx:alpine
    container_name: finance-crm-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - finance-network

  db:
    image: mysql:8.0
    container_name: finance-crm-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: finance_crm
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: finance
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - finance-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: finance-crm-frontend
    container_name: finance-crm-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - finance-network

networks:
  finance-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
